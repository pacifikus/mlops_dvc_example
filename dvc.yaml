stages:
  prepare_v1:
    cmd: python src/prepare_data_v1.py
    deps:
      - src/prepare_data_v1.py
    outs:
      - data/raw/train_v1.csv

  train_v1:
    cmd: python src/train_model_v1.py
    deps:
      - src/train_model_v1.py
      - src/utils.py
      - data/raw/train_v1.csv
      - params.yaml
    outs:
      - models/model_v1.joblib
    metrics:
      - metrics/model_v1_metrics.yaml

  prepare_v2:
    cmd: python src/prepare_data_v2.py
    deps:
      - src/prepare_data_v2.py
      - data/raw/train_v1.csv
    outs:
      - data/processed/train_v2.csv

  train_v2:
    cmd: python src/train_model_v2.py
    deps:
      - src/train_model_v2.py
      - src/utils.py
      - data/processed/train_v2.csv
      - params.yaml
    outs:
      - models/model_v2.joblib
    metrics:
      - metrics/model_v2_metrics.yaml